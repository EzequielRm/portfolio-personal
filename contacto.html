     <main>
        <form id="contact-form" action="#" class="formulario">
                <h1 class="formulariotitulo">Contáctenos</h1>
                <label for="name" class="formulariolabel">Nombre y Apellido</label>
                <input id="name" type="text" name="name" class="formularioinput" required>
                <label for="email" class="formulariolabel">Correo</label>
                <input id="email" type="email" name="email" class="formularioinput" required>
                <label for="phone" class="formulariolabel">Telefono</label>
                <input id="phone" type="tel" name="phone" class="formularioinput" required>
                <label for="message" class="formulariolabel">Mensaje</label>
                <textarea id="message" name="message" class="formularioinput" rows="6" required></textarea>
                <button type="submit" class="formulariosubmit">
                  <span class="btn-text">Enviar</span>
                  <span class="btn-status" aria-live="polite" aria-atomic="true"></span>
                </button>
                <a class="volver-inicio" href="index.html">← Volver a Inicio</a>
        </form>
